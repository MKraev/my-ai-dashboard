<div id="ai-token-dashboard">
  <div class="dashboard-card">
    <header class="dashboard-header">
      <div>
        <h3>📊 AI Token Usage Monitor</h3>
        <p>Live usage overview</p>
      </div>
      <div class="dashboard-badge">Usage snapshot</div>
    </header>

    <div class="dashboard-import">
      <label class="import-label" for="jsonFile">Load TokenTracker JSON:</label>
      <input id="jsonFile" type="file" accept="application/json" />
      <div class="import-hint">Select the exported `ai_token_dashboard_data.json` file from the extension.</div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Current month P</div>
        <div id="text-current-p" class="summary-value">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Current month C</div>
        <div id="text-current-c" class="summary-value">0</div>
      </div>
      <div class="summary-card summary-card--wide">
        <div class="summary-label">Total this month</div>
        <div id="text-current-total" class="summary-value">0</div>
      </div>
    </div>

    <div class="providers">
      <div class="provider-card">
        <div class="provider-row">
          <div>
            <span class="provider-icon">🔹</span>
            <span class="provider-title">Gemini</span>
          </div>
          <span id="text-gemini" class="provider-value">0 tokens</span>
        </div>
        <div class="provider-bar-bg">
          <div id="bar-gemini" class="provider-bar provider-bar--gemini"></div>
        </div>
      </div>

      <div class="provider-card">
        <div class="provider-row">
          <div>
            <span class="provider-icon">🟢</span>
            <span class="provider-title">OpenAI</span>
          </div>
          <span id="text-openai" class="provider-value">0 tokens</span>
        </div>
        <div class="provider-bar-bg">
          <div id="bar-openai" class="provider-bar provider-bar--openai"></div>
        </div>
      </div>

      <div class="provider-card">
        <div class="provider-row">
          <div>
            <span class="provider-icon">🟠</span>
            <span class="provider-title">Claude</span>
          </div>
          <span id="text-claude" class="provider-value">0 tokens</span>
        </div>
        <div class="provider-bar-bg">
          <div id="bar-claude" class="provider-bar provider-bar--claude"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const jsonFile = document.getElementById('jsonFile');
  const currentP = document.getElementById('text-current-p');
  const currentC = document.getElementById('text-current-c');
  const currentTotal = document.getElementById('text-current-total');
  const geminiText = document.getElementById('text-gemini');
  const openaiText = document.getElementById('text-openai');
  const claudeText = document.getElementById('text-claude');
  const geminiBar = document.getElementById('bar-gemini');
  const openaiBar = document.getElementById('bar-openai');
  const claudeBar = document.getElementById('bar-claude');

  jsonFile.addEventListener('change', async (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const providers = data.providers || {};
      const monthlyTotals = data.monthlyTotals || {};
      const monthKeys = Object.keys(monthlyTotals).sort().reverse();
      const currentMonthKey = monthKeys[0] || null;
      const currentMonthData = currentMonthKey ? monthlyTotals[currentMonthKey] : null;

      const geminiData = providers.gemini || { promptTokens: 0, completionTokens: 0 };
      const openaiData = providers.openai || { promptTokens: 0, completionTokens: 0 };
      const claudeData = providers.claude || { promptTokens: 0, completionTokens: 0 };

      const geminiPrompt = geminiData.promptTokens || 0;
      const geminiCompletion = geminiData.completionTokens || 0;
      const openaiPrompt = openaiData.promptTokens || 0;
      const openaiCompletion = openaiData.completionTokens || 0;
      const claudePrompt = claudeData.promptTokens || 0;
      const claudeCompletion = claudeData.completionTokens || 0;

      const providerPromptTotal = geminiPrompt + openaiPrompt + claudePrompt;
      const providerCompletionTotal = geminiCompletion + openaiCompletion + claudeCompletion;
      const modelTotal = providerPromptTotal + providerCompletionTotal;
      const maxValue = Math.max(geminiPrompt + geminiCompletion, openaiPrompt + openaiCompletion, claudePrompt + claudeCompletion, 1);

      const displayPrompt = (currentMonthData && (currentMonthData.promptTokens || currentMonthData.completionTokens)) ? currentMonthData.promptTokens || providerPromptTotal : providerPromptTotal;
      const displayCompletion = (currentMonthData && (currentMonthData.promptTokens || currentMonthData.completionTokens)) ? currentMonthData.completionTokens || providerCompletionTotal : providerCompletionTotal;

      currentP.innerText = `${displayPrompt.toLocaleString()} tokens`;
      currentC.innerText = `${displayCompletion.toLocaleString()} tokens`;
      currentTotal.innerText = `${modelTotal.toLocaleString()} tokens`;

      geminiText.innerText = `${geminiTotal.toLocaleString()} tokens`;
      openaiText.innerText = `${openaiTotal.toLocaleString()} tokens`;
      claudeText.innerText = `${claudeTotal.toLocaleString()} tokens`;

      geminiBar.style.width = `${Math.round((geminiTotal / maxValue) * 100)}%`;
      openaiBar.style.width = `${Math.round((openaiTotal / maxValue) * 100)}%`;
      claudeBar.style.width = `${Math.round((claudeTotal / maxValue) * 100)}%`;
    } catch (err) {
      alert('Unable to parse JSON file. Please select a valid TokenTracker export.');
      console.error(err);
    }
  });
</script>
